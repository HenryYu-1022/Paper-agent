<?xml version="1.0"?>
<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<!DOCTYPE window>
<vbox xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
      xmlns:html="http://www.w3.org/1999/xhtml"
      id="zotero-paper-agent-prefs"
      onload="ZoteroPaperAgentPrefs.init(window)">
  <linkset>
    <html:link rel="localization" href="zotero-paper-agent.ftl" />
  </linkset>

  <groupbox>
    <label><html:h2 data-l10n-id="zotero-paper-agent-pipeline-title"></html:h2></label>
    <vbox align="start">
      <label data-l10n-id="zotero-paper-agent-pipeline-intro"></label>
      <separator class="thin" />

      <hbox align="center">
        <label data-l10n-id="zotero-paper-agent-daemon-path"></label>
        <html:input id="zpa-daemon-path" type="text" flex="1"
          preference="extensions.zotero-paper-agent.daemon_path"
          style="min-width: 420px; font-family: monospace;" />
        <button id="zpa-choose-daemon" data-l10n-id="zotero-paper-agent-choose-file"></button>
      </hbox>

      <hbox align="center">
        <label data-l10n-id="zotero-paper-agent-python-path"></label>
        <html:input id="zpa-python-path" type="text" flex="1"
          preference="extensions.zotero-paper-agent.python_path"
          style="font-family: monospace;" />
        <button id="zpa-choose-python" data-l10n-id="zotero-paper-agent-choose-file"></button>
      </hbox>

      <hbox align="center">
        <label data-l10n-id="zotero-paper-agent-marker-cli"></label>
        <html:input id="zpa-marker-cli" type="text" flex="1"
          preference="extensions.zotero-paper-agent.marker_cli"
          style="font-family: monospace;" />
        <button id="zpa-choose-marker" data-l10n-id="zotero-paper-agent-choose-file"></button>
      </hbox>
    </vbox>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="zotero-paper-agent-library-title"></html:h2></label>
    <vbox align="start">
      <label data-l10n-id="zotero-paper-agent-library-intro"></label>
      <separator class="thin" />

      <hbox align="center">
        <label data-l10n-id="zotero-paper-agent-input-root"></label>
        <html:input id="zpa-input-root" type="text" flex="1"
          preference="extensions.zotero-paper-agent.input_root"
          style="font-family: monospace;" />
        <button id="zpa-choose-input" data-l10n-id="zotero-paper-agent-choose-dir"></button>
      </hbox>

      <hbox align="center">
        <label data-l10n-id="zotero-paper-agent-output-root"></label>
        <html:input id="zpa-output-root" type="text" flex="1"
          preference="extensions.zotero-paper-agent.output_root"
          style="font-family: monospace;" />
        <button id="zpa-choose-output" data-l10n-id="zotero-paper-agent-choose-dir"></button>
      </hbox>

      <hbox align="center">
        <label data-l10n-id="zotero-paper-agent-hf-home"></label>
        <html:input id="zpa-hf-home" type="text" flex="1"
          preference="extensions.zotero-paper-agent.hf_home"
          style="font-family: monospace;" />
        <button id="zpa-choose-hf" data-l10n-id="zotero-paper-agent-choose-dir"></button>
      </hbox>
    </vbox>
  </groupbox>

  <groupbox>
    <label><html:h2 data-l10n-id="zotero-paper-agent-runtime-title"></html:h2></label>
    <vbox align="start">
      <hbox align="center">
        <label data-l10n-id="zotero-paper-agent-device"></label>
        <menulist native="true" preference="extensions.zotero-paper-agent.torch_device">
          <menupopup>
            <menuitem value="mps" label="mps" />
            <menuitem value="cuda" label="cuda" />
            <menuitem value="cpu" label="cpu" />
          </menupopup>
        </menulist>
      </hbox>

      <hbox align="center">
        <label data-l10n-id="zotero-paper-agent-idle-timeout"></label>
        <html:input id="zpa-idle-timeout" type="number" min="0" style="width: 7em;"
          preference="extensions.zotero-paper-agent.idle_timeout" />
      </hbox>

      <checkbox native="true" data-l10n-id="zotero-paper-agent-auto-convert"
        preference="extensions.zotero-paper-agent.auto_convert" />
      <checkbox native="true" data-l10n-id="zotero-paper-agent-auto-rename"
        preference="extensions.zotero-paper-agent.auto_rename" />
      <checkbox native="true" data-l10n-id="zotero-paper-agent-archive-on-trash"
        preference="extensions.zotero-paper-agent.archive_on_trash" />
    </vbox>
  </groupbox>
</vbox>
